name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri dependencies
        run: npm install

      - name: Build Windows binary
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --verbose

      - name: Upload Windows binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = git tag --sort=-version:refname | Select-Object -First 1
          if (-not $tag) {
            $tag = "v0.2.0"
          }
          Write-Host "Uploading to release: $tag"
          
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Host "Found: $($exe.FullName)"
            gh release upload $tag "$($exe.FullName)" --clobber
            Write-Host "Upload complete"
          } else {
            Write-Host "No .exe found in release directory"
            Get-ChildItem -Path "src-tauri/target/release" -Recurse | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
